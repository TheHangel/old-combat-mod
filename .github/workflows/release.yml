name: Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx16G"
      JAVA_TOOL_OPTIONS: "-Xmx16G"
    strategy:
      fail-fast: false
      matrix:
        loader: [ fabric, neoforge, forge ]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      - name: Build ${{ matrix.loader }}
        run: |
          chmod +x gradlew
          ./gradlew :${{ matrix.loader }}:build

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.loader }}
          if-no-files-found: error
          path: |
            ${{ matrix.loader }}/build/libs/*.jar

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/read-versions
        id: versions

      - uses: actions/download-artifact@v4
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true

      - name: Pick release jars
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p upload

          pick() {
            local loader="$1"
            local jar
            jar="$(find dist -maxdepth 1 -type f -name "*-${loader}-*.jar" \
              | grep -Ev '(-sources|-javadoc|-dev)\.jar$' \
              | head -n 1 || true)"
            if [[ -z "${jar:-}" ]]; then
              echo "❌ No main jar found for ${loader} in dist/"
              echo "Found jars:"
              ls -lah dist || true
              exit 1
            fi
            cp "$jar" "upload/"
            echo "✅ ${loader}: $jar"
          }

          pick fabric
          pick neoforge
          pick forge

          echo "Files to upload:"
          ls -lah upload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.versions.outputs.mod_version }}+build.${{ github.run_number }}
          name: Release v${{ steps.versions.outputs.mod_version }} (Minecraft ${{ steps.versions.outputs.mc_version }})
          generate_release_notes: true
          files: |
            upload/*.jar

  publish:
    runs-on: ubuntu-latest
    needs: [ build, release ]
    environment: production
    strategy:
      fail-fast: false
      matrix:
        loader: [ fabric, neoforge, forge ]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/read-versions
        id: versions

      - uses: actions/download-artifact@v4
        with:
          name: jar-${{ matrix.loader }}
          path: dist

      - name: Pick release jar
        shell: bash
        run: |
          set -euo pipefail
          JAR=$(ls -1 dist/*.jar | grep -Ev '(-sources|-javadoc|-dev)\.jar$' | head -n 1)
          echo "JAR=$JAR" >> $GITHUB_ENV
          echo "Using $JAR"

      - name: Publish (${{ matrix.loader }})
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: dZ1APLkO
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: 430735
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          files: |
            ${{ env.JAR }}

          version: ${{ steps.versions.outputs.mod_version }}+${{ matrix.loader }}.build.${{ github.run_number }}
          name: ${{ matrix.loader }} ${{ steps.versions.outputs.mod_version }} (Minecraft ${{ steps.versions.outputs.mc_version }})

          loaders: |
            ${{ matrix.loader }}

          game-versions: |
            ${{ steps.versions.outputs.mc_version }}
